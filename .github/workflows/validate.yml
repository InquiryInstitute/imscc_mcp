name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Ruby gems
        run: bundle install

      - name: npm install & build
        run: |
          npm ci
          npm run build

      - name: Validation tests
        run: npm test
